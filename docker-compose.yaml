version: '3.8'
services:
  postgres-server:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres-user
      POSTGRES_PASSWORD: postgres-password
      POSTGRES_DB: cobaia
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

