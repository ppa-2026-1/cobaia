version: '3.8'

services:
  app1:
    build: ../user-api
    container_name: app1
    environment:
      - SERVER_PORT=8080
    ports:
      - "8081:8080"

  app2:
    build: ../user-api
    container_name: app2
    environment:
      - SERVER_PORT=8080
    ports:
      - "8082:8080"

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2